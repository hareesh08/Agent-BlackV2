services:
  research-agent:
    build:
      context: .
      dockerfile: agents/research-agent/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - agent-black-net

  solution-agent:
    build:
      context: .
      dockerfile: agents/solution-agent/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - agent-black-net

  experiment-agent:
    build:
      context: .
      dockerfile: agents/experiment-agent/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - agent-black-net

  control-panel:
    build:
      context: .
      dockerfile: agents/host-agent/Dockerfile.control-panel
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      - research-agent
      - solution-agent
      - experiment-agent
    restart: unless-stopped
    networks:
      - agent-black-net

  frontend:
    build:
      context: .
      dockerfile: devops/Dockerfile.frontend
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    environment:
      - VITE_PROXY_TARGET=http://control-panel:8000
    depends_on:
      - control-panel
    restart: unless-stopped
    networks:
      - agent-black-net

networks:
  agent-black-net:
    driver: bridge
